<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuestCheck</title>
    {% set v = 59 %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/app-icon-180x180.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#10B981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tables.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/event-detail.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/friends.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tags.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}?v={{ v }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
    <nav>
        {% block logo %}<a href="{{ url_for('events.home') }}" class="logo">
            <svg viewBox="0 0 240 48" width="170" height="34" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="40" height="40" rx="10" fill="none" stroke="#10B981" stroke-width="1.8"/>
                <path d="M16 26 L23 33 L36 18" fill="none" stroke="#10B981" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                <text x="56" y="32" font-family="'DM Sans',sans-serif" font-size="25" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">Guest<tspan fill="#10B981" font-weight="400">Check</tspan></text>
            </svg>
        </a>{% if config.APP_ENV == 'staging' %}<span class="env-badge">TEST</span>{% endif %}{% endblock %}
        {% if current_user.is_authenticated %}
        <div class="nav-tabs">
            <a href="{{ url_for('events.home') }}" class="nav-tab{% if request.endpoint and request.endpoint.startswith('events.') %} active{% endif %}">
                <svg class="nav-tab-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="nav-tab-label">Events</span>
            </a>
            <a href="{{ url_for('friends.friends') }}" class="nav-tab{% if request.endpoint and request.endpoint.startswith('friends.') %} active{% endif %}">
                <svg class="nav-tab-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
                <span class="nav-tab-label">Friends</span>
            </a>
        </div>
        <button type="button" class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="hamburger-menu" id="hamburger-menu">
            <a href="{{ url_for('tags.tags') }}">Tags</a>
            <a href="{{ url_for('history.history') }}">History</a>
            <a href="{{ url_for('settings.settings') }}">Settings</a>
            <div class="hamburger-divider"></div>
            <form method="POST" action="{{ url_for('auth.logout') }}" class="inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="nav-logout">Logout</button>
            </form>
        </div>
        <div class="hamburger-overlay" id="hamburger-overlay"></div>
        {% endif %}
    </nav>
    <main>
        {% for msg in get_flashed_messages() %}
        <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/common.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='js/tables.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='js/event-detail.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='js/friends.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='js/tags.js') }}?v={{ v }}"></script>
</body>
</html>
