{% for guest in guests %}
<tr data-guest-id="{{ guest.id }}"
    data-gender="{{ guest.gender }}"
    data-first="{{ guest.first_name|lower }}"
    data-last="{{ (guest.last_name or '')|lower }}"
    data-created="{{ guest.date_created.isoformat() if guest.date_created else '' }}"
    data-is-me="{{ 'true' if guest.is_me else 'false' }}"
    data-is-archived="{{ 'true' if guest.is_archived else 'false' }}"
    data-tags="{{ guest.tags|map(attribute='id')|join(',') }}"
    class="{{ 'archived-row' if guest.is_archived else '' }}">
    <td class="center col-multiselect" style="display:none"><input type="checkbox" class="row-select"></td>
    <td><input type="text" class="inline-edit ge-first" autocomplete="off" name="gf_{{ guest.id }}" value="{{ guest.first_name }}" data-guest-id="{{ guest.id }}"></td>
    <td><input type="text" class="inline-edit ge-last" autocomplete="off" name="gl_{{ guest.id }}" value="{{ guest.last_name or '' }}" data-guest-id="{{ guest.id }}"></td>
    <td class="gender-cell">
        <select class="inline-select ge-gender gender-tag-select" data-guest-id="{{ guest.id }}">
            <option value="Male"{{ ' selected' if guest.gender == 'Male' }}>Male</option>
            <option value="Female"{{ ' selected' if guest.gender == 'Female' }}>Female</option>
        </select>
    </td>
    <td class="col-expand-mobile"><input type="text" class="inline-edit ge-notes" autocomplete="nope" value="{{ guest.notes or '' }}" placeholder="Add notes about guest" data-guest-id="{{ guest.id }}"></td>
    <td class="col-expand ge-tags-cell">{% for tag in guest.tags %}<span class="tag-badge" style="background:{{ tag.color }}">{{ tag.name }}</span> {% endfor %}</td>
    <td>
        <div class="kebab-wrapper">
            <button type="button" class="kebab-btn" aria-label="Actions">&#x2026;</button>
            <div class="kebab-menu">
                <button type="button" class="ge-detail-btn" data-guest-id="{{ guest.id }}">Guest detail</button>
                <button type="button" class="ge-archive-btn" data-guest-id="{{ guest.id }}">{{ 'Unarchive' if guest.is_archived else 'Archive' }}</button>
                <form method="POST" action="{{ url_for('guests.delete_guest', guest_id=guest.id) }}" class="inline"
                      data-confirm="Delete this guest? They will also be removed from all events.">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="kebab-danger">Delete</button>
                </form>
            </div>
        </div>
    </td>
</tr>
{% endfor %}
