{% for guest in guests %}
<tr data-guest-id="{{ guest.id }}"
    data-gender="{{ guest.gender }}"
    data-first="{{ guest.first_name|lower }}"
    data-last="{{ (guest.last_name or '')|lower }}"
    data-created="{{ guest.date_created.isoformat() if guest.date_created else '' }}"
    data-is-me="{{ 'true' if guest.is_me else 'false' }}"
    data-is-archived="{{ 'true' if guest.is_archived else 'false' }}"
    data-tags="{{ guest.tags|rejectattr('deleted_at')|map(attribute='id')|join(',') }}"
    class="{{ 'archived-row' if guest.is_archived else '' }}">
    <td class="center col-multiselect" style="display:none"><input type="checkbox" class="row-select"></td>
    <td><textarea class="inline-edit ge-first" rows="1" data-guest-id="{{ guest.id }}"{{ ' readonly' if guest.is_me }}>{{ guest.first_name }}</textarea></td>
    <td><textarea class="inline-edit ge-last" rows="1" data-guest-id="{{ guest.id }}"{{ ' readonly' if guest.is_me }}>{{ guest.last_name or '' }}</textarea></td>
    <td class="gender-cell">
        <select class="inline-select ge-gender gender-tag-select" data-guest-id="{{ guest.id }}"{{ ' disabled' if guest.is_me }}>
            <option value="Male"{{ ' selected' if guest.gender == 'Male' }}>Male</option>
            <option value="Female"{{ ' selected' if guest.gender == 'Female' }}>Female</option>
        </select>
    </td>
    <td class="col-expand-mobile"><input type="text" class="inline-edit ge-notes" autocomplete="off" value="{{ guest.notes or '' }}" placeholder="Add notes" data-guest-id="{{ guest.id }}"></td>
    <td class="col-expand ge-tags-cell">{% for tag in guest.tags if not tag.deleted_at %}<span class="tag-badge" style="background:{{ tag.color }}">{{ tag.name }}</span> {% endfor %}</td>
    <td>
        <div class="kebab-wrapper">
            <button type="button" class="kebab-btn" aria-label="Actions">&#x2026;</button>
            <div class="kebab-menu">
                <button type="button" class="ge-detail-btn" data-guest-id="{{ guest.id }}"><svg class="kebab-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Friend detail</button>
                {% if guest.is_me %}
                <button type="button" class="kebab-disabled is-me-blocked" data-msg="Your profile cannot be archived. Edit it in Settings > My Profile."><svg class="kebab-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Archive</button>
                <button type="button" class="kebab-disabled is-me-blocked" data-msg="Your profile cannot be deleted. Edit it in Settings > My Profile."><svg class="kebab-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</button>
                {% else %}
                <button type="button" class="ge-archive-btn" data-guest-id="{{ guest.id }}"><svg class="kebab-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>{{ 'Unarchive' if guest.is_archived else 'Archive' }}</button>
                <form method="POST" action="{{ url_for('friends.delete_friend', guest_id=guest.id) }}" class="inline"
                      data-confirm="Delete this friend? They will also be removed from all events.">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="kebab-danger"><svg class="kebab-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</button>
                </form>
                {% endif %}
            </div>
        </div>
    </td>
</tr>
{% endfor %}
