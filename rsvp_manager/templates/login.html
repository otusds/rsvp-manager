{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h1>GuestCheck</h1>
        <p class="auth-tagline">Guest tracking made simple.</p>
    </div>
    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}
    <form method="POST" class="form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Your password">

        <div class="form-actions">
            <button type="submit" class="btn btn-full">Log In</button>
        </div>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.forgot_password') }}">Forgot your password?</a></p>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
</div>
{% endblock %}
